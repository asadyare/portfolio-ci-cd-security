name: shared-security

on:
  workflow_call:
    inputs:
      node-version:
        required: true
        type: string
      docker-context:
        required: true
        type: string
      image-name:
        required: true
        type: string
      dockerfile-repo:
        required: false
        type: string
      dockerfile-path:
        required: false
        type: string

permissions:
  contents: read
  security-events: write

jobs:
  security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm

      - run: npm ci

      - name: NPM audit
        run: npm audit --audit-level=high

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          args: detect --redact --report-format sarif --report-path gitleaks.sarif

      - name: Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/javascript

      - name: Build application
        run: npm run build

      - name: Checkout Dockerfile repo
        if: inputs.dockerfile-repo != ''
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.dockerfile-repo }}
          path: dockerfile-repo

      - name: Build image
        run: |
          if [ -n "${{ inputs.dockerfile-repo }}" ] && [ -n "${{ inputs.dockerfile-path }}" ]; then
            docker build -f dockerfile-repo/${{ inputs.dockerfile-path }} -t ${{ inputs.image-name }}:${{ github.sha }} ${{ inputs.docker-context }}
          else
            docker build -t ${{ inputs.image-name }}:${{ github.sha }} ${{ inputs.docker-context }}
          fi

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          image-ref: ${{ inputs.image-name }}:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true